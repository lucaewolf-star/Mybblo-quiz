<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MY.BBLO — Conferma azione</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --cream:#F7F2EA;--white:#FFFFFF;--ink:#1E1A16;--ink-soft:#3A3028;--ink-muted:#8A7E72;
  --border-gold:#D4B87A;--border:#E8DFD0;
  --gold:#A67C3A;--gold-light:#C9A86C;
  --rose:#8A3A34;--green:#4A6B52;
  --bg:#1A1612;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);font-family:'Jost',sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{max-width:480px;width:100%;background:var(--white);border-radius:16px;border:1px solid var(--border);overflow:hidden;box-shadow:0 8px 32px rgba(30,26,22,.08);}
.card-top{background:var(--bg);padding:24px;text-align:center;}
.logo{font-family:'Cormorant Garamond',serif;font-size:16px;letter-spacing:.3em;color:var(--gold-light);}
.card-body{padding:32px 28px;text-align:center;}
.icon{font-size:32px;margin-bottom:16px;}
.titolo{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--ink);margin-bottom:12px;line-height:1.3;}
.testo{font-size:14px;color:var(--ink-soft);line-height:1.7;margin-bottom:28px;}
.testo b{color:var(--ink);}
.btn{display:block;width:100%;padding:16px;border:none;border-radius:10px;font-family:'Jost',sans-serif;font-size:15px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;margin-bottom:12px;text-decoration:none;}
.btn-confirm{background:linear-gradient(135deg,#B8922A 0%,#C9A86C 50%,#A67C3A 100%);color:#fff;}
.btn-confirm:hover{opacity:.92;}
.btn-cancel{background:transparent;color:var(--ink-muted);font-weight:500;text-transform:none;letter-spacing:0;font-size:13px;}
.esito{display:none;}
.esito .icon-esito{font-size:40px;margin-bottom:14px;}
.esito-titolo{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--ink);margin-bottom:10px;}
.esito-testo{font-size:14px;color:var(--ink-soft);line-height:1.7;}
.errore{display:none;background:rgba(138,58,52,.08);border-left:3px solid var(--rose);border-radius:0 8px 8px 0;padding:12px 14px;font-size:13px;color:var(--rose);text-align:left;margin-top:16px;}
</style>
</head>
<body>
<div class="card">
  <div class="card-top"><div class="logo">MY · BBLO</div></div>
  <div class="card-body">

    <div id="domanda">
      <div class="icon" id="icona">—</div>
      <div class="titolo" id="titolo">—</div>
      <div class="testo" id="testo">—</div>
      <button class="btn btn-confirm" id="btn-confirm" onclick="conferma()">Confermo</button>
      <a href="javascript:window.close();" class="btn btn-cancel">Annulla, torna indietro</a>
      <div class="errore" id="errore">Si è verificato un problema nel registrare l'azione. Riprova, oppure contatta il supporto se il problema persiste.</div>
    </div>

    <div class="esito" id="esito-ok">
      <div class="icon-esito">✓</div>
      <div class="esito-titolo">Fatto</div>
      <div class="esito-testo" id="esito-testo">—</div>
    </div>

  </div>
</div>

<script>
// ─── Configurazione testi per tipo di azione ──────────────────────────────
const AZIONI = {
  rifiuto: {
    icona: '↩',
    titolo: c => `Confermi il rifiuto/rinvio per ${c}?`,
    testo: c => `Stai per segnalare che <b>${c}</b> ha rifiutato o rinviato il check-up dopo la chiamata. Partirà in automatico un percorso di due email, a distanza di una settimana l'una dall'altra, pensate per farla tornare sui suoi passi — non dovrai fare altro.`,
    esito: c => `Il rifiuto/rinvio per <b>${c}</b> è stato registrato. Il sistema si occuperà del resto.`
  },
  confermato: {
    icona: '✓',
    titolo: c => `Confermi il check-up per ${c}?`,
    testo: c => `Stai per segnalare che <b>${c}</b> ha confermato e prenotato il check-up. Ci aiuta a seguire insieme i risultati nel tempo.`,
    esito: c => `Il check-up confermato per <b>${c}</b> è stato registrato. Grazie!`
  },
  blocca: {
    icona: '⏸',
    titolo: c => `Confermi di voler bloccare l'invio per ${c}?`,
    testo: c => `Stai per fermare la prossima email commerciale prevista per <b>${c}</b>, perché ha già prenotato o si è presentata. Una volta confermato, quell'email non verrà inviata.`,
    esito: c => `L'invio per <b>${c}</b> è stato bloccato con successo.`
  }
};

// ─── Lettura parametri URL ─────────────────────────────────────────────────
function init() {
  const p = new URLSearchParams(window.location.search);
  const azione = p.get('azione') || 'rifiuto';
  const nome = decodeURIComponent(p.get('nome') || 'questo contatto');
  const cfg = AZIONI[azione] || AZIONI.rifiuto;

  document.getElementById('icona').textContent = cfg.icona;
  document.getElementById('titolo').textContent = cfg.titolo(nome);
  document.getElementById('testo').innerHTML = cfg.testo(nome);

  window._cfg = cfg;
  window._nome = nome;
  window._token = p.get('token') || '';
  window._azione = azione;
}

// ─── Conferma azione ────────────────────────────────────────────────────
// NOTA PER IL DEVELOPER: qui va inserita la chiamata reale alla funzione
// serverless (es. fetch verso l'endpoint corrispondente all'azione, passando
// window._token). La riga sotto va sostituita con la chiamata vera; per ora
// simula sempre un esito positivo per permettere il test visivo della pagina.
async function conferma() {
  const btn = document.getElementById('btn-confirm');
  btn.disabled = true;
  btn.textContent = 'Un momento…';
  document.getElementById('errore').style.display = 'none';

  try {
    // TODO developer: sostituire con la chiamata reale, es.
    // const res = await fetch('/api/' + window._azione, { method:'POST', body: JSON.stringify({ token: window._token }) });
    // if (!res.ok) throw new Error('errore');
    await new Promise(r => setTimeout(r, 600)); // placeholder, da rimuovere

    document.getElementById('domanda').style.display = 'none';
    document.getElementById('esito-testo').innerHTML = window._cfg.esito(window._nome);
    document.getElementById('esito-ok').style.display = 'block';
  } catch (e) {
    document.getElementById('errore').style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Confermo';
  }
}

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
